{% extends "base.html" %}

{% block title %}New Procedure — ImplantDB{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="card-title mb-0">
                    <i class="fas fa-calendar-plus me-2"></i>New Procedure
                </h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="patient_name" class="form-label">Patient Name *</label>
                        <input type="text" class="form-control" id="patient_name" name="patient_name"
                               required placeholder="e.g., Jane Smith">
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Surgery Date <span class="text-muted">(optional)</span></label>
                        <input type="date" class="form-control" id="date" name="date">
                        <div class="form-text">Leave blank if the date is not yet scheduled</div>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <a href="{{ url_for('procedures') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-arrow-right me-1"></i>Continue &amp; Add Implants
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
